<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JFrog AI Perception Scorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
:root {
  --green: #40BE46;
  --green-light: rgba(64,190,70,0.12);
  --green-glow: 0 0 20px rgba(64,190,70,0.25);
  --dark: #0d1b2e;
  --dark-2: #162236;
  --dark-3: #1e2f45;
  --card: #ffffff;
  --bg: #f0f4f9;
  --border: #e4eaf2;
  --border-dark: rgba(255,255,255,0.08);
  --muted: #7a8899;
  --text: #0d1b2e;
  --red: #f04444;
  --amber: #f5a623;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --radius: 14px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  --shadow-lg: 0 2px 8px rgba(0,0,0,0.08), 0 12px 32px rgba(0,0,0,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

/* ── PROGRESS BAR ── */
.progress-bar {
  height: 2px; background: linear-gradient(90deg, var(--green), #7dde81);
  width: 0; transition: width .5s ease; position: fixed; top: 0; left: 0; z-index: 300;
  box-shadow: 0 0 8px rgba(64,190,70,0.6);
}

/* ── HEADER ── */
header {
  background: var(--dark);
  border-bottom: 1px solid var(--border-dark);
  padding: 0 32px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.3);
}
.logo { display: flex; align-items: center; gap: 16px; }
header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; color: white; }
header p { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 1px; }

.scan-btn {
  background: var(--green); color: white; border: none;
  padding: 9px 20px; border-radius: 8px; font-size: 13px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  transition: all .2s; font-family: inherit; letter-spacing: 0.01em;
  box-shadow: 0 2px 8px rgba(64,190,70,0.35);
}
.scan-btn:hover { background: #38a83e; box-shadow: 0 4px 16px rgba(64,190,70,0.45); transform: translateY(-1px); }
.scan-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.export-btn {
  background: transparent; color: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.2);
  padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: all .2s; font-family: inherit;
}
.export-btn:hover { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.4); }
.export-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* ── LAYOUT ── */
.container { max-width: 1160px; margin: 0 auto; padding: 28px 20px; }

/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark-2) 50%, #1a2f48 100%);
  border-radius: var(--radius); padding: 32px 36px; margin-bottom: 24px; color: white;
  border: 1px solid var(--border-dark);
  display: grid; grid-template-columns: auto 1fr 1fr 1fr; gap: 0;
  box-shadow: var(--shadow-lg);
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(64,190,70,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.hero-main { padding-right: 36px; border-right: 1px solid rgba(255,255,255,0.08); }
.hero-score-wrap { display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px; }
.hero-score { font-size: 88px; font-weight: 900; color: var(--green); line-height: 1;
  letter-spacing: -4px; text-shadow: var(--green-glow); }
.hero-score-max { font-size: 22px; font-weight: 600; color: rgba(255,255,255,0.25); align-self: flex-end; margin-bottom: 12px; }
.hero-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); }
.hero-delta { font-size: 13px; font-weight: 700; margin-top: 10px; }
.delta-up { color: var(--green); } .delta-down { color: var(--red); }
.scan-time { font-size: 11px; color: rgba(255,255,255,0.28); margin-top: 12px; }
.hero-stat { display: flex; flex-direction: column; justify-content: center; padding: 0 28px; border-right: 1px solid rgba(255,255,255,0.08); }
.hero-stat:last-child { border-right: none; }
.hero-stat-num { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
.hero-stat-label { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 5px; font-weight: 500; }

/* ── SECTION LABEL ── */
.section-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em;
  color: var(--muted); margin-bottom: 10px;
}

/* ── CARDS ── */
.card {
  background: var(--card); border-radius: var(--radius);
  border: 1px solid var(--border); padding: 22px;
  box-shadow: var(--shadow);
}
.card h3 {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px;
}

/* ── GRID ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 20px; }
.mb24 { margin-bottom: 20px; }

/* ── SOV BARS ── */
.sov-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.sov-row:last-child { margin-bottom: 0; }
.sov-name { width: 76px; font-size: 13px; font-weight: 700; }
.sov-track { flex: 1; height: 8px; background: #f1f5f9; border-radius: 99px; overflow: hidden; }
.sov-fill { height: 100%; border-radius: 99px; transition: width .8s cubic-bezier(.4,0,.2,1); }
.sov-pct { width: 40px; text-align: right; font-size: 13px; font-weight: 700; }
.sov-fill-jfrog    { background: linear-gradient(90deg, #40BE46, #7dde81); }
.sov-fill-sonatype { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
.sov-fill-snyk     { background: linear-gradient(90deg, #8b5cf6, #a78bfa); }

/* ── LLM CARDS ── */
.llm-card { text-align: center; position: relative; overflow: hidden; }
.llm-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--llm-color, var(--green));
}
.llm-name { font-size: 13px; font-weight: 700; color: var(--llm-color, var(--text)); margin-bottom: 12px; }
.llm-score-ring {
  width: 88px; height: 88px; border-radius: 50%; margin: 0 auto 12px;
  background: conic-gradient(var(--llm-color, var(--green)) calc(var(--pct, 0) * 3.6deg), #f1f5f9 0deg);
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.llm-score-ring::before {
  content: ''; position: absolute; width: 66px; height: 66px;
  background: white; border-radius: 50%;
}
.llm-score { font-size: 28px; font-weight: 800; position: relative; z-index: 1; color: var(--llm-color, var(--text)); }
.llm-mention { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 500; }
.llm-bar { height: 4px; background: #f1f5f9; border-radius: 99px; margin-top: 14px; overflow: hidden; }
.llm-fill { height: 100%; border-radius: 99px; transition: width .7s cubic-bezier(.4,0,.2,1); }
.llm-delta { font-size: 12px; font-weight: 600; margin-top: 6px; }
.demo-badge {
  position: absolute; top: 14px; right: 14px;
  background: #fff8e1; color: #b45309; font-size: 9px; font-weight: 800;
  padding: 2px 7px; border-radius: 99px; letter-spacing: 0.05em; text-transform: uppercase;
  border: 1px solid #fde68a;
}

/* ── INSIGHTS ── */
.insight {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.insight:last-child { border-bottom: none; padding-bottom: 0; }
.insight-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
.insight-text { font-size: 13px; color: #374151; line-height: 1.6; font-weight: 500; }

/* ── Q&A RESPONSES ── */
.question-block { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 8px; }
.q-header {
  background: #f8fafc; padding: 12px 16px;
  cursor: pointer; display: block;
  transition: background .15s; user-select: none;
}
.q-header:hover { background: #eef2f7; }
.q-header-top {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
}
.q-header-badges { display: flex; align-items: center; gap: 6px; }
.q-header-text {
  font-size: 13px; font-weight: 600; color: #1e293b; line-height: 1.5;
}
.q-dim {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px;
  background: #e0e7ff; color: #3730a3; text-transform: uppercase; letter-spacing: 0.05em;
  white-space: nowrap;
}
.q-prompted {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px;
  background: #fef9c3; color: #854d0e; letter-spacing: 0.05em;
  border: 1px solid #fde047; white-space: nowrap;
}
.ci-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); }
.ci-row:last-child { border-bottom:none; }
.ci-dim { font-size:13px; font-weight:600; }
.ci-scores { display:flex; gap:20px; }
.ci-company { text-align:right; }
.ci-company .ci-val { font-size:18px; font-weight:800; }
.ci-company .ci-pm { font-size:11px; color:var(--muted); font-weight:500; }
.ci-company .ci-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
.q-body { display: none; }
.q-body.open { display: block; }
.llm-ans { padding: 14px 16px; border-top: 1px solid var(--border); }
.ans-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.llm-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 99px; letter-spacing: 0.04em; }
.b-ChatGPT { background: #d1fae5; color: #065f46; }
.b-Claude  { background: #fce7f3; color: #9d174d; }
.b-Gemini  { background: #dbeafe; color: #1e40af; }
.b-Grok    { background: #f1f5f9; color: #475569; }
.ans-text { font-size: 13px; color: #374151; line-height: 1.7; }
.score-chip {
  font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 99px;
  background: var(--green); color: white; margin-left: auto; letter-spacing: 0.03em;
}
.score-chip.mid { background: #fef3c7; color: #92400e; }
.score-chip.low { background: #fee2e2; color: #991b1b; }
.feature-tag {
  display: inline-block; background: #f0fdf4; color: #166534;
  font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px;
  margin: 2px; border: 1px solid #bbf7d0;
}

/* ── SCAN PANEL ── */
.scan-panel {
  background: var(--dark-2); border-radius: var(--radius); padding: 22px 26px;
  margin-bottom: 24px; display: none; border: 1px solid var(--border-dark);
  box-shadow: var(--shadow-lg);
}
.scan-panel.show { display: block; }
.scan-panel-title {
  color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 16px;
}
.llm-rows { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 14px; }
.llm-row {
  background: rgba(255,255,255,0.04); border-radius: 10px; padding: 14px 16px;
  border: 1px solid rgba(255,255,255,0.06); transition: border-color .3s;
}
.llm-row.ok    { border-color: rgba(64,190,70,0.3); background: rgba(64,190,70,0.06); }
.llm-row.fail  { border-color: rgba(240,68,68,0.3); background: rgba(240,68,68,0.06); }
.llm-row.demo  { border-color: rgba(245,166,35,0.3); background: rgba(245,166,35,0.06); }
.llm-row-name { color: white; font-size: 13px; font-weight: 700; margin-bottom: 6px; }
.llm-row-status { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 500; }
.llm-row.ok   .llm-row-status { color: var(--green); }
.llm-row.fail .llm-row-status { color: var(--red); }
.llm-row.demo .llm-row-status { color: var(--amber); }
.analyze-bar-wrap { margin-top: 6px; }
.analyze-label { color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 8px; font-weight: 500; }
.analyze-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 99px; overflow: hidden; }
.analyze-fill { height: 100%; background: linear-gradient(90deg, var(--green), #7dde81); border-radius: 99px; transition: width .3s; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center; padding: 100px 20px; color: var(--muted);
  background: white; border-radius: var(--radius); border: 1px solid var(--border);
  box-shadow: var(--shadow);
}
.empty-icon { font-size: 52px; margin-bottom: 16px; opacity: 0.6; }
.empty h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.empty p { font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }

/* ── JFROG LOADER ── */
.jfrog-loader {
  background: linear-gradient(135deg, #1B2A4A 0%, #0f1a30 100%);
  border-radius: var(--radius); padding: 80px 20px;
  text-align: center; color: white;
  box-shadow: 0 8px 40px rgba(0,0,0,0.18);
}
.jfrog-loader-logo {
  height: 32px; margin-bottom: 40px; opacity: 0.95;
  filter: brightness(0) invert(1);
}
.jfrog-radar {
  position: relative; width: 90px; height: 90px;
  margin: 0 auto 32px; display: flex; align-items: center; justify-content: center;
}
.jfrog-radar::before,
.jfrog-radar::after {
  content: ''; position: absolute; inset: 0;
  border-radius: 50%; border: 2px solid rgba(64,190,70,0.3);
  animation: radar-ring 2s ease-out infinite;
}
.jfrog-radar::after { animation-delay: 1s; }
.radar-ring2 {
  position: absolute; inset: 0;
  border-radius: 50%; border: 2px solid rgba(64,190,70,0.15);
  animation: radar-ring 2s ease-out infinite; animation-delay: 0.5s;
}
@keyframes radar-ring {
  0%   { transform: scale(0.5); opacity: 1; }
  100% { transform: scale(1.9); opacity: 0; }
}
.radar-frog {
  font-size: 36px; position: relative; z-index: 1;
  animation: frog-bob 1.6s ease-in-out infinite;
}
@keyframes frog-bob {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-6px); }
}
.jfrog-loader-dots {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 18px;
}
.jfrog-loader-dots span {
  width: 8px; height: 8px; border-radius: 50%; background: #40BE46;
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.jfrog-loader-dots span:nth-child(2) { animation-delay: 0.2s; }
.jfrog-loader-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40%           { transform: scale(1);   opacity: 1; }
}
.jfrog-loader h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: white; }
.jfrog-loader p  { font-size: 13px; color: rgba(255,255,255,0.45); }

/* ── RESPONSIVE ── */
@media(max-width:800px) {
  .grid4 { grid-template-columns: repeat(2,1fr); }
  .grid2 { grid-template-columns: 1fr; }
  .hero { grid-template-columns: 1fr 1fr; gap: 20px; padding: 24px; }
  .hero-main { grid-column: 1/-1; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08); padding-right: 0; padding-bottom: 20px; }
  .hero-stat { border-right: none; padding: 0; }
  .llm-rows { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>
<div class="progress-bar" id="pbar"></div>

<header>
  <div class="logo">
    <img src="https://speedmedia2.jfrog.com/08612fe1-9391-4cf3-ac1a-6dd49c36b276/media.jfrog.com/wp-content/uploads/2024/08/08132607/jfrog-logo-2022.svg"
         alt="JFrog" style="height:34px; filter: brightness(0) invert(1);">
    <div style="border-left:1px solid rgba(255,255,255,0.2); padding-left:16px; margin-left:4px;">
      <h1>AI Perception Scorecard</h1>
      <p>How LLMs position JFrog vs Sonatype & Snyk in Security</p>
    </div>
  </div>
  <div class="header-actions" style="display:flex;align-items:center;gap:10px">
    <button class="export-btn" id="pdfBtn" onclick="exportPDF()" disabled title="Download dashboard as PDF">
      ⬇ Export PDF
    </button>
    <button class="scan-btn" id="scanBtn" onclick="startScan()">
      <span>▶</span> Run New Scan
    </button>
  </div>
</header>

<div class="container">

  <!-- Live scan status panel -->
  <div class="scan-panel" id="scanPanel">
    <div class="scan-panel-title">Live Scan Progress</div>
    <div class="llm-rows" id="llmRows"></div>
    <div class="analyze-bar-wrap" id="analyzeWrap" style="display:none">
      <div class="analyze-label" id="analyzeLabel">Analyzing responses with GPT-4o mini...</div>
      <div class="analyze-bar"><div class="analyze-fill" id="analyzeFill" style="width:0%"></div></div>
    </div>
  </div>

  <div id="app">
    <div class="jfrog-loader">
      <img class="jfrog-loader-logo"
        src="https://speedmedia2.jfrog.com/08612fe1-9391-4cf3-ac1a-6dd49c36b276/media.jfrog.com/wp-content/uploads/2024/08/08132607/jfrog-logo-2022.svg"
        alt="JFrog">
      <div class="jfrog-radar">
        <div class="radar-ring2"></div>
        <div class="radar-frog">🐸</div>
      </div>
      <div class="jfrog-loader-dots"><span></span><span></span><span></span></div>
      <h2>Loading scan data</h2>
      <p>Connecting to MongoDB Atlas…</p>
    </div>
  </div>
</div>

<script>
const DIM_LABELS = {
  supply_chain: "Supply Chain",
  vulnerability_scanning: "Vuln Scanning",
  compliance: "Compliance",
  enterprise: "Enterprise",
  developer_ux: "Developer UX",
};
const COLORS = { JFrog:"#40BE46", Sonatype:"#3B82F6", Snyk:"#8B5CF6" };
const LLM_COLORS = { ChatGPT:"#10B981", "Llama 3":"#F97316", "Llama 4":"#8B5CF6", "Qwen 3":"#3B82F6" };
const LLMS = ["ChatGPT", "Llama 3", "Llama 4", "Qwen 3"];

let trendChart = null, radarChart = null, currentScanData = null;
// Track status per LLM: pending / running / ok / fail / demo
let llmStatus = {};
const TOTAL_PROMPTS = 25;

function chipClass(s) { return s >= 55 ? "" : s >= 35 ? "mid" : "low"; }
function deltaHtml(d) {
  if (d === undefined || d === null) return "";
  const sign = d > 0 ? "+" : "";
  const cls = d > 0 ? "delta-up" : d < 0 ? "delta-down" : "";
  return `<span class="${cls}">${sign}${d} vs last scan</span>`;
}

function initLLMRows() {
  llmStatus = Object.fromEntries(LLMS.map(l => [l, { state:"pending", done:0, ok:0, fail:0 }]));
  document.getElementById("llmRows").innerHTML = LLMS.map(llm => `
    <div class="llm-row" id="row-${llm}">
      <div class="llm-row-name" style="color:${LLM_COLORS[llm]}">${llm}</div>
      <div class="llm-row-status" id="status-${llm}">⏳ Waiting...</div>
    </div>`).join("");
}

function updateLLMRow(llm) {
  const s = llmStatus[llm];
  const row = document.getElementById(`row-${llm}`);
  const statusEl = document.getElementById(`status-${llm}`);
  if (!row || !statusEl) return;

  row.className = "llm-row";
  if (s.state === "running") {
    statusEl.textContent = `⏳ ${s.done}/${TOTAL_PROMPTS} prompts`;
  } else if (s.state === "done") {
    if (s.fail === 0 && !s.demo) {
      row.classList.add("ok");
      statusEl.textContent = `✅ ${s.ok}/${TOTAL_PROMPTS} completed`;
    } else if (s.demo) {
      row.classList.add("demo");
      statusEl.textContent = `🔵 Demo mode (${s.ok} responses)`;
    } else {
      row.classList.add(s.ok > 0 ? "demo" : "fail");
      statusEl.textContent = `⚠️ ${s.ok} ok · ${s.fail} failed`;
    }
  }
}

async function startScan() {
  const btn = document.getElementById("scanBtn");
  const panel = document.getElementById("scanPanel");
  const pbar = document.getElementById("pbar");

  btn.disabled = true;
  btn.innerHTML = "<span>⏳</span> Scanning...";
  panel.className = "scan-panel show";
  pbar.style.width = "5%";
  document.getElementById("analyzeWrap").style.display = "none";
  initLLMRows();

  const es = new EventSource("/api/scan");

  es.addEventListener("llm_start", e => {
    const { llm } = JSON.parse(e.data);
    llmStatus[llm].state = "running";
    updateLLMRow(llm);
    pbar.style.width = "30%";
  });

  es.addEventListener("llm_done", e => {
    const { llm, ok, demo } = JSON.parse(e.data);
    llmStatus[llm].done++;
    if (ok) llmStatus[llm].ok++; else llmStatus[llm].fail++;
    if (demo) llmStatus[llm].demo = true;
    if (llmStatus[llm].done >= TOTAL_PROMPTS) llmStatus[llm].state = "done";
    updateLLMRow(llm);
  });

  es.addEventListener("analyzing", e => {
    const { count, total } = JSON.parse(e.data);
    const wrap = document.getElementById("analyzeWrap");
    wrap.style.display = "block";
    document.getElementById("analyzeLabel").textContent =
      `Analyzing with GPT-4o mini... ${count}/${total}`;
    document.getElementById("analyzeFill").style.width = `${Math.round(count/total*100)}%`;
    pbar.style.width = "70%";
  });

  es.addEventListener("complete", e => {
    es.close();
    pbar.style.width = "100%";
    btn.disabled = false;
    btn.innerHTML = "<span>▶</span> Run New Scan";
    document.getElementById("analyzeLabel").textContent = "✅ Analysis complete";
    document.getElementById("analyzeFill").style.width = "100%";
    setTimeout(() => {
      panel.className = "scan-panel";
      pbar.style.width = "0";
    }, 2000);
    renderDashboard(JSON.parse(e.data));
    loadTrend();
  });

  es.addEventListener("error", () => {
    es.close();
    btn.disabled = false;
    btn.innerHTML = "<span>▶</span> Run New Scan";
    document.getElementById("analyzeLabel").textContent = "❌ Error — check API keys in .env";
    pbar.style.width = "0";
  });
}

function stdDev(arr) {
  if (!arr.length) return 0;
  const mean = arr.reduce((a, b) => a + b, 0) / arr.length;
  return Math.round(Math.sqrt(arr.reduce((s, x) => s + (x - mean) ** 2, 0) / arr.length));
}

function buildCITable(results, llms) {
  const dims = Object.keys(DIM_LABELS);
  const companies = ["JFrog", "Sonatype", "Snyk"];
  const compColors = { JFrog: "#40BE46", Sonatype: "#3B82F6", Snyk: "#8B5CF6" };

  return dims.map(dim => {
    const dimResults = results.filter(r => r.prompt.dimension === dim);
    const cols = companies.map(company => {
      // one score per LLM (avg across prompts in this dimension for that LLM)
      const perLLM = llms.map(llm => {
        const llmRows = dimResults.filter(r => r.llm === llm);
        if (!llmRows.length) return 0;
        return llmRows.reduce((s, r) => s + (r.scores?.[company]?.rawScore ?? 0), 0) / llmRows.length;
      });
      const mean = Math.round(perLLM.reduce((a, b) => a + b, 0) / perLLM.length);
      const sd = stdDev(perLLM);
      return `<div class="ci-company">
        <div class="ci-label" style="color:${compColors[company]}">${company}</div>
        <div class="ci-val" style="color:${compColors[company]}">${mean}<span class="ci-pm"> ±${sd}</span></div>
      </div>`;
    }).join("");

    // also show unprompted-only average for JFrog
    const unprompted = dimResults.filter(r => !r.prompt.prompted);
    const unpromptedAvg = unprompted.length
      ? Math.round(unprompted.reduce((s, r) => s + (r.scores?.JFrog?.rawScore ?? 0), 0) / unprompted.length)
      : null;
    const unpromptedNote = unpromptedAvg !== null && unpromptedAvg !== Math.round(dimResults.reduce((s,r)=>s+(r.scores?.JFrog?.rawScore??0),0)/dimResults.length)
      ? `<span style="font-size:11px;color:var(--muted);margin-left:10px">(unprompted: ${unpromptedAvg})</span>` : "";

    return `<div class="ci-row">
      <div class="ci-dim">${DIM_LABELS[dim]}${unpromptedNote}</div>
      <div class="ci-scores">${cols}</div>
    </div>`;
  }).join("");
}

function generateRecommendations(summary) {
  const recs = [];
  const dim = summary.dimensionScores || {};
  const comp = summary.competitorScores || {};

  const rec = (priority, icon, title, body) =>
    `<div style="display:flex;gap:12px;padding:14px;border-radius:10px;background:${priority==='high'?'#fff7ed':priority==='medium'?'#fffbeb':'#f0fdf4'};border:1px solid ${priority==='high'?'#fed7aa':priority==='medium'?'#fde68a':'#bbf7d0'}">
      <div style="font-size:20px;flex-shrink:0">${icon}</div>
      <div>
        <div style="font-size:13px;font-weight:700;margin-bottom:4px;color:${priority==='high'?'#9a3412':priority==='medium'?'#92400e':'#166534'}">${title}</div>
        <div style="font-size:12px;color:#374151;line-height:1.6">${body}</div>
      </div>
    </div>`;

  if ((dim.supply_chain || 0) < 40) {
    recs.push(rec('high', '🔗', 'Supply Chain: Publish Curation & SBOM content',
      'LLMs associate supply chain security with Snyk. JFrog Curation proactively blocks malicious packages — publish case studies, blog posts, and technical docs specifically using the terms "software supply chain" and "SBOM" to improve training data coverage.'));
  }
  if ((dim.developer_ux || 0) < 35) {
    recs.push(rec('high', '👨‍💻', 'Developer UX: Amplify the shift-left story',
      'Snyk dominates developer-first perception. JFrog should invest in IDE plugin content, CLI tutorials, and "zero friction security" messaging to close this gap. Specifically: more developer-focused blog posts and YouTube content about Xray IDE integration.'));
  }
  if ((dim.compliance || 0) < 30) {
    recs.push(rec('medium', '⚖️', 'Compliance: Link Xray to license policy enforcement',
      'LLMs don\'t strongly associate JFrog with license compliance. Create content explicitly about "license policy enforcement at the repository level" — Xray\'s native capability that Snyk/Sonatype also offer but JFrog does natively in Artifactory.'));
  }
  if ((dim.vulnerability_scanning || 0) >= 35) {
    recs.push(rec('low', '🔍', 'Vulnerability Scanning: Maintain Xray positioning',
      'JFrog ties or leads on vulnerability scanning perception. Continue publishing Xray benchmark content, CVE response blog posts, and "binary-level scanning" differentiation vs. source-code-only tools.'));
  }
  if ((dim.enterprise || 0) >= 60) {
    recs.push(rec('low', '🏢', 'Enterprise: Leverage the strength — bridge to other dimensions',
      `JFrog\'s enterprise score (${dim.enterprise}) significantly outperforms competitors. Use this as a platform: enterprise DevSecOps content should cross-reference supply chain and compliance capabilities to lift those scores too.`));
  }

  return recs.length ? recs.join('') : '<p style="color:var(--muted);font-size:13px">Run a scan to generate recommendations.</p>';
}

function renderDashboard(data) {
  currentScanData = data;
  document.getElementById("pdfBtn").disabled = false;
  const { summary, results, timestamp } = data;
  const llms = ["ChatGPT", "Llama 3", "Llama 4", "Qwen 3"];
  const dims = Object.keys(DIM_LABELS);

  // SOV
  const sovHtml = summary.shareOfVoice.map(s => {
    const cls = `sov-fill-${s.company.toLowerCase()}`;
    return `<div class="sov-row">
      <div class="sov-name">${s.company}</div>
      <div class="sov-track"><div class="sov-fill ${cls}" style="width:${s.percentage}%"></div></div>
      <div class="sov-pct" style="color:${COLORS[s.company] || '#333'}">${s.percentage}%</div>
    </div>`;
  }).join("");

  // LLM cards
  const llmCards = llms.map(llm => {
    const s = summary.llmSummaries[llm];
    if (!s) return "";
    const d = s.delta;
    const pct = Math.min(100, s.overallScore);
    return `<div class="card llm-card" style="--llm-color:${LLM_COLORS[llm]}">
      ${s.isDemo ? '<div class="demo-badge">Demo</div>' : ''}
      <div class="llm-name">${llm}</div>
      <div class="llm-score-ring" style="--pct:${pct}">
        <div class="llm-score">${s.overallScore}</div>
      </div>
      <div class="llm-delta">${d !== undefined ? deltaHtml(d) : ''}</div>
      <div class="llm-mention">Mentions JFrog in ${s.mentionRate}% of responses</div>
      <div class="llm-bar"><div class="llm-fill" style="width:${pct}%;background:${LLM_COLORS[llm]}"></div></div>
    </div>`;
  }).join("");

  // Competitor bar
  const allScores = { JFrog: summary.overallScore, ...summary.competitorScores };
  const maxS = Math.max(...Object.values(allScores), 1);
  const compHtml = Object.entries(allScores).map(([co, sc]) => `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:86px;font-size:14px;font-weight:700">${co}</div>
      <div style="flex:1;height:12px;background:var(--border);border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${Math.round(sc/maxS*100)}%;background:${COLORS[co]||'#999'};border-radius:6px;transition:width .7s"></div>
      </div>
      <div style="width:32px;text-align:right;font-size:14px;font-weight:700">${sc}</div>
    </div>`).join("");

  // Insights
  const insightIcon = { win:"✅", loss:"⚠️", neutral:"➡️" };
  const insightsHtml = (summary.insights || []).map(i =>
    `<div class="insight">
      <div class="insight-icon">${insightIcon[i.type]}</div>
      <div class="insight-text">${i.message}</div>
    </div>`
  ).join("");

  // Responses
  const byPrompt = {};
  for (const r of results) {
    const key = r.prompt.id;
    if (!byPrompt[key]) byPrompt[key] = { prompt: r.prompt, answers: [] };
    byPrompt[key].answers.push(r);
  }
  const qHtml = Object.values(byPrompt).map((q, i) => {
    const avg = Math.round(q.answers.reduce((s, a) => s + (a.scores?.JFrog?.rawScore ?? 0), 0) / q.answers.length);
    const dim = DIM_LABELS[q.prompt.dimension] || q.prompt.dimension;
    const ansHtml = q.answers.map(a => {
      const js = a.scores?.JFrog?.rawScore ?? 0;
      const feats = (a.scores?.JFrog?.featuresAttributed || []).map(f => `<span class="feature-tag">${f}</span>`).join("");
      return `<div class="llm-ans">
        <div class="ans-header">
          <span class="llm-badge b-${a.llm}">${a.llm}</span>
          <span style="font-size:11px;color:var(--muted)">${a.latencyMs}ms</span>
          <span class="score-chip ${chipClass(js)}">JFrog: ${js}</span>
        </div>
        <div class="ans-text">${a.answer || '<em style="color:#aaa">No response</em>'}</div>
        ${feats ? `<div style="margin-top:6px">${feats}</div>` : ""}
      </div>`;
    }).join("");
    const promptedBadge = q.prompt.prompted
      ? `<span class="q-prompted" title="This prompt names JFrog explicitly">PROMPTED</span>`
      : "";
    return `<div class="question-block">
      <div class="q-header" onclick="toggleQ('qb${i}')">
        <div class="q-header-top">
          <div class="q-header-badges">
            <span class="q-dim">${dim}</span>${promptedBadge}
          </div>
          <span class="score-chip ${chipClass(avg)}">${avg}</span>
        </div>
        <div class="q-header-text">${q.prompt.text}</div>
      </div>
      <div class="q-body" id="qb${i}">${ansHtml}</div>
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    <div class="hero">
      <div class="hero-main">
        <div class="hero-label">JFrog AI Perception Score</div>
        <div class="hero-score-wrap">
          <div class="hero-score">${summary.overallScore}</div>
          <div class="hero-score-max">/100</div>
        </div>
        <div class="hero-delta">${deltaHtml(summary.overallDelta)}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.38);margin-top:8px;line-height:1.5;max-width:220px;">
          Composite of mention rank, sentiment &amp; features attributed across ${LLMS.length} LLMs × ${TOTAL_PROMPTS} prompts
        </div>
        <div class="scan-time">Last scan: ${new Date(timestamp).toLocaleString()}</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num">${summary.totalResponses}</div>
        <div class="hero-stat-label">LLM responses analyzed</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num">${summary.shareOfVoice.find(s=>s.company==="JFrog")?.percentage ?? 0}%</div>
        <div class="hero-stat-label">Share of Voice</div>
      </div>
      <div class="hero-stat">
        <div class="hero-stat-num">4</div>
        <div class="hero-stat-label">LLMs benchmarked</div>
      </div>
    </div>

    <div class="grid2 mb24">
      <div class="card">
        <h3>Share of Voice — % of responses mentioning each company</h3>
        ${sovHtml}
      </div>
      <div class="card">
        <h3>Competitive Positioning (avg score)</h3>
        ${compHtml}
      </div>
    </div>

    <div class="grid4">${llmCards}</div>

    <div class="grid2 mb24">
      <div class="card">
        <h3>Dimension Breakdown (JFrog)</h3>
        <canvas id="radarChart" height="220"></canvas>
      </div>
      <div class="card">
        <h3>Score Trend Over Time</h3>
        <canvas id="trendChart" height="220"></canvas>
      </div>
    </div>

    <div class="card mb24">
      <h3>Competitive Intelligence Insights</h3>
      ${insightsHtml || '<p style="color:var(--muted);font-size:13px;margin-top:8px">Run more scans to generate insights.</p>'}
    </div>

    <div class="card mb24">
      <h3>Dimension Scores with Confidence Intervals</h3>
      <p style="font-size:12px;color:var(--muted);margin:4px 0 14px">Score ± std deviation across ${llms.length} LLMs. Wide ± = LLMs disagree. Narrow ± = consistent perception.</p>
      ${buildCITable(results, llms)}
    </div>

    <div class="card mb24">
      <h3>AI Positioning Recommendations</h3>
      <p style="font-size:13px;color:var(--muted);margin:8px 0 16px">Based on perception gaps identified — actions JFrog can take to improve LLM rankings.</p>
      <div style="display:flex;flex-direction:column;gap:10px">
        ${generateRecommendations(summary)}
      </div>
    </div>

    <div class="card">
      <h3>All Responses — Question by Question</h3>
      <div style="margin-top:16px">${qHtml}</div>
    </div>`;

  // Radar chart
  const dimKeys = Object.keys(DIM_LABELS);
  const radarCtx = document.getElementById("radarChart").getContext("2d");
  if (radarChart) radarChart.destroy();
  radarChart = new Chart(radarCtx, {
    type: "radar",
    data: {
      labels: dimKeys.map(k => DIM_LABELS[k]),
      datasets: [
        { label: "JFrog", data: dimKeys.map(k => summary.dimensionScores[k] ?? 0),
          borderColor: "#41BF47", backgroundColor: "rgba(65,191,71,0.15)", pointBackgroundColor: "#41BF47" },
        { label: "Sonatype", data: dimKeys.map(k => {
            const rs = results.filter(r => r.prompt.dimension === k);
            return rs.length ? Math.round(rs.reduce((s,r)=>s+(r.scores?.Sonatype?.rawScore??0),0)/rs.length) : 0;
          }), borderColor:"#3B82F6", backgroundColor:"rgba(59,130,246,0.1)", pointBackgroundColor:"#3B82F6" },
        { label: "Snyk", data: dimKeys.map(k => {
            const rs = results.filter(r => r.prompt.dimension === k);
            return rs.length ? Math.round(rs.reduce((s,r)=>s+(r.scores?.Snyk?.rawScore??0),0)/rs.length) : 0;
          }), borderColor:"#8B5CF6", backgroundColor:"rgba(139,92,246,0.1)", pointBackgroundColor:"#8B5CF6" },
      ],
    },
    options: {
      scales: { r: { min: 0, max: 100, ticks: { stepSize: 20, font:{size:10} }, pointLabels:{font:{size:11}} } },
      plugins: { legend: { position:"bottom", labels:{font:{size:11}} } },
    }
  });

  loadTrend();
}

function toggleQ(id) { document.getElementById(id)?.classList.toggle("open"); }

async function loadTrend() {
  const history = await fetch("/api/history").then(r => r.json());
  if (!history || history.length < 2) return;
  const labels = history.map(h => new Date(h.timestamp).toLocaleDateString());
  const jfrog = history.map(h => h.summary.overallScore);
  const sonatype = history.map(h => h.summary.competitorScores?.Sonatype ?? 0);
  const snyk = history.map(h => h.summary.competitorScores?.Snyk ?? 0);

  const ctx = document.getElementById("trendChart")?.getContext("2d");
  if (!ctx) return;
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label:"JFrog", data:jfrog, borderColor:"#41BF47", backgroundColor:"rgba(65,191,71,0.1)", tension:.4, fill:true },
        { label:"Sonatype", data:sonatype, borderColor:"#3B82F6", backgroundColor:"transparent", tension:.4 },
        { label:"Snyk", data:snyk, borderColor:"#8B5CF6", backgroundColor:"transparent", tension:.4 },
      ],
    },
    options: {
      scales: { y: { min:0, max:100, grid:{color:"#f0f0f0"} }, x:{grid:{display:false}} },
      plugins: { legend:{position:"bottom", labels:{font:{size:11}}} },
    }
  });
}

async function exportPDF() {
  if (!currentScanData) return;
  const btn = document.getElementById("pdfBtn");
  btn.disabled = true;
  btn.textContent = "⏳ Generating...";

  const { jsPDF } = window.jspdf;
  const container = document.querySelector(".container");
  const ts = new Date(currentScanData.timestamp).toISOString().slice(0, 10);

  try {
    const canvas = await html2canvas(container, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#f0f4f9",
      ignoreElements: el => el.id === "scanPanel",
    });

    const imgW = 210; // A4 width mm
    const imgH = (canvas.height * imgW) / canvas.width;
    const pdf = new jsPDF({ orientation: imgH > imgW ? "p" : "l", unit: "mm", format: "a4" });

    const pageH = pdf.internal.pageSize.getHeight();
    let yOffset = 0;
    while (yOffset < imgH) {
      if (yOffset > 0) pdf.addPage();
      pdf.addImage(canvas.toDataURL("image/png"), "PNG", 0, -yOffset, imgW, imgH);
      yOffset += pageH;
    }

    pdf.save(`jfrog-ai-scorecard-${ts}.pdf`);
  } finally {
    btn.disabled = false;
    btn.innerHTML = "⬇ Export PDF";
  }
}
